{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl border border-gray-100 shadow-sm">
        <div>
            <h2 class="mt-6 text-center text-3xl font-black text-gray-900">Nouveau mot de passe</h2>
            <p class="mt-2 text-center text-sm text-gray-500">Configurez votre nouveau mot de passe d'accès.</p>
        </div>
        <form class="mt-8 space-y-6" method="POST">
            <div class="space-y-4">
                <div>
                    <label for="password" class="block text-xs font-bold text-gray-500 uppercase mb-2">Nouveau mot de passe</label>
                    <input id="password" name="password" type="password" required class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:border-blue-600 focus:outline-none" placeholder="••••••••">
                </div>
                <div>
                    <label for="confirm_password" class="block text-xs font-bold text-gray-500 uppercase mb-2">Confirmez le mot de passe</label>
                    <input id="password" name="confirm_password" type="password" required class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:border-blue-600 focus:outline-none" placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl text-sm transition-all shadow-sm">
                Mettre à jour le mot de passe
            </button>
        </form>
    </div>
</div>
{% endblock %}
