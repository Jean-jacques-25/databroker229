{% extends "base.html" %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
    <div style="background:#111;border:1px solid #222;border-radius:20px;padding:40px;width:100%;max-width:420px;">
        <div style="text-align:center;margin-bottom:28px;">
            <h1 style="font-size:22px;font-weight:900;color:#fff;">Nouveau mot de passe</h1>
            <p style="color:#888;font-size:13px;">Choisissez un mot de passe securise</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for cat, msg in messages %}
        <div style="border-radius:10px;padding:12px;margin-bottom:16px;font-size:13px;color:{% if cat == 'success' %}#10b981{% else %}#ef4444{% endif %};">{{ msg }}</div>
        {% endfor %}{% endif %}{% endwith %}
        <form method="POST" style="display:flex;flex-direction:column;gap:16px;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="password" name="password" placeholder="Minimum 6 caracteres" required minlength="6"
                style="width:100%;background:#0d0d0d;border:1px solid #333;border-radius:10px;padding:12px 14px;color:#fff;font-size:13px;outline:none;box-sizing:border-box;">
            <button type="submit" style="background:#10b981;color:#fff;font-weight:900;border:none;border-radius:12px;padding:14px;font-size:15px;cursor:pointer;">
                Confirmer le mot de passe
            </button>
        </form>
    </div>
</div>
{% endblock %}
