{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto my-24 bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
    <h2 class="text-2xl font-bold text-gray-900 text-center mb-2">Connexion</h2>
    <p class="text-sm text-gray-500 text-center mb-8">Accédez à votre espace Databroker229</p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4 font-medium">
                {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}

    <form method="POST" action="/login" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Adresse Email</label>
            <input type="text" name="identifier" class="w-full border border-gray-200 rounded-lg p-2.5 focus:outline-none focus:border-blue-600" placeholder="exemple@mail.com ou téléphone" required>
        </div>

        <div>
            <div class="flex justify-between mb-1">
                <label class="block text-sm font-semibold text-gray-700">Mot de passe</label>
                <a href="#" class="text-xs text-blue-600 hover:underline">Mot de passe oublié ?</a>
            </div>
            <input type="password" name="password" class="w-full border border-gray-200 rounded-lg p-2.5 focus:outline-none focus:border-blue-600" placeholder="••••••••" required>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700 transition mt-6">
            Se connecter
        </button>
    </form>

    <p class="text-xs text-center text-gray-500 mt-6">
        Nouveau sur la plateforme ? <a href="/register" class="text-blue-600 font-semibold hover:underline">Créer un compte</a>
    </p>
</div>
{% endblock %}
