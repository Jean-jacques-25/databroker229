{% extends "base.html" %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 16px;">
    <div style="width:100%;max-width:420px;">

        <div style="text-align:center;margin-bottom:40px;">
            <div style="width:56px;height:56px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#0a0a0a;margin:0 auto 20px;">D</div>
            <h2 style="font-size:28px;font-weight:900;color:#fff;letter-spacing:-0.5px;margin-bottom:8px;">Connexion</h2>
            <p style="color:#888;font-size:14px;">Accédez à votre espace LaCentraleDesDonnées229</p>
        </div>

        <div class="card-dark" style="padding:36px;">
            <form method="POST" action="/login" style="display:flex;flex-direction:column;gap:20px;">
                <div>
                    <label style="display:block;font-size:12px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Email ou Téléphone</label>
                    <input type="text" name="identifier" placeholder="exemple@mail.com ou +229..." required
                        style="width:100%;background:#0d0d0d;border:1px solid #222;border-radius:12px;padding:14px 16px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;transition:border-color 0.2s;"
                        onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='#222'">
                </div>
                <div>
                    <label style="display:block;font-size:12px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Mot de passe</label>
                    <input type="password" name="password" placeholder="••••••••" required
                        style="width:100%;background:#0d0d0d;border:1px solid #222;border-radius:12px;padding:14px 16px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;transition:border-color 0.2s;"
                        onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='#222'">
                </div>
                <button type="submit" class="btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:15px;margin-top:4px;">
                    Se connecter →
                </button>
            </form>
        </div>

        <p style="text-align:center;color:#444;font-size:13px;margin-top:24px;">
            Nouveau sur la plateforme ?
            <a href="/register" style="color:#f59e0b;font-weight:700;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">Créer un compte</a>
        </p>
    </div>
</div>
{% endblock %}
