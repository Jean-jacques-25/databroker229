{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl border border-gray-100 shadow-sm">
        <div>
            <h2 class="mt-6 text-center text-3xl font-black text-gray-900">Mot de passe oublié ?</h2>
            <p class="mt-2 text-center text-sm text-gray-500">Entrez votre adresse e-mail pour recevoir un lien de récupération sécurisé.</p>
        </div>
        <form class="mt-8 space-y-6" method="POST">
            <div>
                <label for="email" class="block text-xs font-bold text-gray-500 uppercase mb-2">Adresse E-mail</label>
                <input id="email" name="email" type="email" required class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:border-blue-600 focus:outline-none" placeholder="votre@email.com">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl text-sm transition-all shadow-sm">
                Envoyer le lien de récupération
            </button>
        </form>
        <div class="text-center mt-4">
            <a href="{{ url_for('main.login') }}" class="text-xs font-bold text-blue-600 hover:underline">Retour à la page de connexion</a>
        </div>
    </div>
</div>
{% endblock %}
