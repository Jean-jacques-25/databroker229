{% extends "base.html" %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 16px;">
    <div style="width:100%;max-width:460px;">

        <div style="text-align:center;margin-bottom:40px;">
            <div style="width:56px;height:56px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#0a0a0a;margin:0 auto 20px;">D</div>
            <h2 style="font-size:28px;font-weight:900;color:#fff;letter-spacing:-0.5px;margin-bottom:8px;">Créer un compte</h2>
            <p style="color:#555;font-size:14px;">Rejoignez DataBroker229 aujourd'hui</p>
        </div>

        <div class="card-dark" style="padding:36px;">
            <form method="POST" action="/register" style="display:flex;flex-direction:column;gap:18px;">

                <div>
                    <label style="display:block;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Votre profil *</label>
                    <select name="role" required
                        style="width:100%;background:#0d0d0d;border:1px solid #222;border-radius:12px;padding:14px 16px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;"
                        onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='#222'">
                        <option value="agent">🧑‍💼 Agent de collecte (Terrain)</option>
                        <option value="client">🏢 Entreprise / Client (Commande données)</option>
                    </select>
                </div>

                <div>
                    <label style="display:block;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Nom complet *</label>
                    <input type="text" name="fullname" placeholder="Ex: Jean-Jacques Agan" required
                        style="width:100%;background:#0d0d0d;border:1px solid #222;border-radius:12px;padding:14px 16px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;"
                        onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='#222'">
                </div>

                <div>
                    <label style="display:block;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Numéro de téléphone *</label>
                    <input type="text" name="phone" placeholder="Ex: +229 01000000" required
                        style="width:100%;background:#0d0d0d;border:1px solid #222;border-radius:12px;padding:14px 16px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;"
                        onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='#222'">
                </div>

                <div>
                    <label style="display:block;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Adresse email *</label>
                    <input type="email" name="email" placeholder="exemple@mail.com" required
                        style="width:100%;background:#0d0d0d;border:1px solid #222;border-radius:12px;padding:14px 16px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;"
                        onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='#222'">
                </div>

                <div>
                    <label style="display:block;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Mot de passe *</label>
                    <input type="password" name="password" placeholder="••••••••" required
                        style="width:100%;background:#0d0d0d;border:1px solid #222;border-radius:12px;padding:14px 16px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;"
                        onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='#222'">
                </div>

                <div>
                    <label style="display:block;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Zone principale *</label>
                    <input type="text" name="location" placeholder="Ex: Cotonou, Calavi, Parakou..." required
                        style="width:100%;background:#0d0d0d;border:1px solid #222;border-radius:12px;padding:14px 16px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;"
                        onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='#222'">
                </div>

                <button type="submit" class="btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:15px;margin-top:4px;">
                    Créer mon compte →
                </button>
            </form>
        </div>

        <p style="text-align:center;color:#444;font-size:13px;margin-top:24px;">
            Déjà un compte ?
            <a href="/login" style="color:#f59e0b;font-weight:700;text-decoration:none;">Se connecter</a>
        </p>
    </div>
</div>
{% endblock %}
