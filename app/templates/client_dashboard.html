{% extends "base.html" %}
{% block content %}
<div class="p-8">
    <h1 class="text-2xl font-bold">Espace Client</h1>
<div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
        <span class="text-xs font-bold text-gray-400 uppercase">Missions lancées</span>
        <p class="text-2xl font-black text-gray-800 mt-2">{{ missions|length }}</p>
    </div>
    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
        <span class="text-xs font-bold text-gray-400 uppercase">Données</span>
        <p class="text-2xl font-black text-blue-600 mt-2">{{ submissions|length }} dossiers</p>
    </div>
</div>
<div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm mb-8">
    <h2 class="text-lg font-bold mb-4">🎯 Créer une mission</h2>
    <form method="POST" class="space-y-4">
        <input type="text" name="title" placeholder="Titre de la mission" class="w-full border p-2 rounded-lg" required>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Lancer</button>
    </form>
</div>
    <div class="mt-4">
        {% for mission in missions %}
            <p>{{ mission.title }}</p>
        {% else %}
            <p>Aucune mission trouvée.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
