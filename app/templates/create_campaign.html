{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md my-10">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">Nouvelle campagne de collecte</h2>
    
    <!-- L'action doit pointer vers ta route et spécifier method="POST" -->
    <form action="{{ url_for('create_campaign') }}" method="POST">
        
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">Zone cible :</label>
            <input type="text" name="zone" placeholder="Ex: Fidjrossè, Cotonou" class="w-full p-2 border rounded" required>
        </div>

        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">Type de collecte :</label>
            <select name="type" class="w-full p-2 border rounded">
                <option value="Boutique Mapping">Cartographie de Boutiques</option>
                <option value="Sondage Opinion">Sondage d'opinion</option>
                <option value="Prix Produits">Relevé de prix</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">Nombre de points/missions recherchés :</label>
            <input type="number" name="quantity" id="quantity" min="1" placeholder="Ex: 200" class="w-full p-2 border rounded" required>
        </div>

        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">Budget Total Alloué (FCFA) :</label>
            <input type="number" name="budget_total" id="budget_total" min="500" placeholder="Ex: 100000" class="w-full p-2 border rounded" required>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white font-bold p-3 rounded hover:bg-blue-700 transition">
            LANCER LA MISSION
        </button>
    </form>
</div>
{% endblock %}
