{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md my-10">
    <h2 class="text-2xl font-bold mb-6 text-gray-800 flex items-center">
        🎯 Commander une nouvelle collecte
    </h2>
    
    <form action="{{ url_for('create_campaign') }}" method="POST">
        
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-1">Intitulé de la mission *</label>
            <input type="text" name="title" placeholder="Ex: Recensement des boutiques MTN à Cotonou" class="w-full p-2 border rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>

        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-1">Description courte *</label>
            <textarea name="description" rows="3" placeholder="Décrivez globalement le but de la collecte..." class="w-full p-2 border rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required></textarea>
        </div>

        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-1">Protocole / Instructions strictes pour l'agent *</label>
            <textarea name="protocol" rows="4" placeholder="Ex: 1- Prendre en photo la devanture. 2- Demander le numéro du gérant. 3- Activer obligatoirement le GPS..." class="w-full p-2 border rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-1">Zone cible *</label>
                <input type="text" name="zone" placeholder="Ex: Akpakpa" class="w-full p-2 border rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">Difficulté *</label>
                <select name="difficulty" class="w-full p-2 border rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="Standard">Standard</option>
                    <option value="Facile">Facile</option>
                    <option value="Difficile">Difficile</option>
                </select>
            </div>
        </div>

        <!-- Les deux nouveaux champs alignés en grille comme ton design -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-gray-700 font-semibold mb-1">Nombre de points *</label>
                <input type="number" name="quantity" min="1" placeholder="Ex: 100" class="w-full p-2 border rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">Budget Total (FCFA) *</label>
                <input type="number" name="budget_total" min="500" placeholder="Ex: 50000" class="w-full p-2 border rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white font-bold p-3 rounded-lg hover:bg-blue-700 transition shadow-md flex items-center justify-center gap-2">
            🚀 Lancer et financer la mission
        </button>
    </form>
</div>
{% endblock %}
